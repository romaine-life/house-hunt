name: Deploy Frontend

on:
  push:
    branches: [main]
    paths: ["frontend/**"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP_NAME: house-hunt-rg
  SWA_NAME: house-hunt-app

jobs:
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Generate Config
        run: |
          # MICROSOFT_CLIENT_ID is owned by this repo's tofu (oauth.tf) and
          # published to App Configuration. Fetched here so the source of truth
          # is the tofu-managed value, not a stale GitHub variable.
          MICROSOFT_CLIENT_ID=$(az appconfig kv show \
            --name infra-appconfig \
            --key househunt/microsoft_oauth_client_id \
            --query value -o tsv)
          export API_URL="https://api.romaine.life/househunt"
          export MAPS_CLIENT_ID="${{ vars.MAPS_CLIENT_ID }}"
          export MICROSOFT_CLIENT_ID
          chmod +x ./frontend/generate-config.sh
          ./frontend/generate-config.sh

      - name: Generate version.json
        run: |
          echo "{\"sha\":\"${GITHUB_SHA::7}\",\"deployedAt\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > frontend/version.json

      - name: Get SWA Deployment Token
        id: swa-token
        run: |
          TOKEN=$(az staticwebapp secrets list --name $SWA_NAME --resource-group $RESOURCE_GROUP_NAME --query "properties.apiKey" -o tsv)
          echo "::add-mask::$TOKEN"
          echo "deployment_token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.deployment_token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./frontend"
          output_location: ""
          skip_app_build: true
