name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - backend/**
      - frontend/**
      - Dockerfile
      - .dockerignore
      - k8s/**
      - .github/workflows/build-and-deploy.yaml
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

concurrency:
  group: build-and-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build image, push, bump kustomization tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Generate frontend/config.js
        # MAPS_CLIENT_ID is owned by this repo's tofu and published to App
        # Configuration. Fetched here so the source of truth is the
        # tofu-managed value. (Microsoft sign-in is delegated upstream to
        # auth.romaine.life; no OAuth client ID in the bundle.)
        run: |
          MAPS_CLIENT_ID=$(az appconfig kv show \
            --name infra-appconfig \
            --key househunt/maps_client_id \
            --query value -o tsv)
          export MAPS_CLIENT_ID
          chmod +x ./frontend/generate-config.sh
          ./frontend/generate-config.sh

      - name: ACR login
        run: az acr login --name romainecr

      - name: Build and push image
        run: |
          TAG="${GITHUB_SHA::7}"
          IMAGE="romainecr.azurecr.io/house-hunt:${TAG}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "TAG=${TAG}" >> $GITHUB_ENV


      - name: Bump image tag in k8s/values.yaml
        run: |
          sed -i "s|^  tag: .*|  tag: ${{ env.TAG }}|" k8s/values.yaml

      - name: Commit and push tag bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/values.yaml
          if git diff --cached --quiet; then
            echo "No values changes to commit"
            exit 0
          fi
          git commit -m "chore: bump house-hunt image to ${{ env.TAG }} [skip ci]"
          git push
