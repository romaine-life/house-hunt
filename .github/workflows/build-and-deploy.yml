name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - backend/**
      - frontend/**
      - Dockerfile
      - .dockerignore
      - k8s/**
      - .github/workflows/build-and-deploy.yml
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

concurrency:
  group: build-and-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build image, push, bump kustomization tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Generate frontend/config.js
        # MICROSOFT_CLIENT_ID and MAPS_CLIENT_ID are owned by this repo's tofu
        # and published to App Configuration. Fetched here so the source of
        # truth is the tofu-managed values.
        run: |
          MICROSOFT_CLIENT_ID=$(az appconfig kv show \
            --name infra-appconfig \
            --key househunt/microsoft_oauth_client_id \
            --query value -o tsv)
          MAPS_CLIENT_ID=$(az appconfig kv show \
            --name infra-appconfig \
            --key househunt/maps_client_id \
            --query value -o tsv)
          export MICROSOFT_CLIENT_ID MAPS_CLIENT_ID
          chmod +x ./frontend/generate-config.sh
          ./frontend/generate-config.sh

      - name: ACR login
        run: az acr login --name romainecr

      - name: Build and push image
        run: |
          TAG="${GITHUB_SHA::7}"
          IMAGE="romainecr.azurecr.io/house-hunt:${TAG}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "TAG=${TAG}" >> $GITHUB_ENV

      - name: Install kustomize
        run: |
          curl -sSL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Bump image tag in k8s/kustomization.yaml
        working-directory: k8s
        run: kustomize edit set image romainecr.azurecr.io/house-hunt=romainecr.azurecr.io/house-hunt:${{ env.TAG }}

      - name: Commit and push tag bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/kustomization.yaml
          if git diff --cached --quiet; then
            echo "No kustomization changes to commit"
            exit 0
          fi
          git commit -m "chore: bump house-hunt image to ${{ env.TAG }} [skip ci]"
          git push
