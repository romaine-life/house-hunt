name: Lint

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-quality:
    uses: nelsong6/pipeline-templates/.github/workflows/lint-template.yml@main
    with:
      working_directory: '.'

  check-removed-msal:
    name: Removed MSAL surface
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Guard against MSAL/legacy-auth reintroduction
        run: node scripts/check-removed-msal.mjs
